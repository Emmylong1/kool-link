<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool Flow - Pure Ice. Reliable Delivery.</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
   

    <!-- Preconnect for faster font/icon fetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Manrope -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN (sync load; avoids “unstyled flash” on mount) -->

    <!-- SEO & Social Media Meta Tags -->
    <meta name="description" content="Cool Flow - Premium ice block delivery service in Calabar, Nigeria. Fast, reliable delivery for events, businesses, and homes. Order online or via WhatsApp.">
    <meta name="keywords" content="ice delivery, ice blocks, Calabar, Nigeria, event ice, commercial ice, frozen water">
    <meta name="theme-color" content="#1132d4">
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Cool Flow - Pure Ice. Reliable Delivery.">
    <meta property="og:description" content="Premium ice block delivery service in Calabar. Fast, reliable delivery for all occasions. Order now!">
    <meta property="og:url" content="https://coolflow.ng">
    <meta property="og:image" content="https://coolflow.ng/og-image.jpg">
    <meta property="og:site_name" content="Cool Flow">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cool Flow - Pure Ice. Reliable Delivery.">
    <meta name="twitter:description" content="Premium ice block delivery in Calabar. Fast & reliable service for events and businesses.">
    <meta name="twitter:image" content="https://coolflow.ng/og-image.jpg">
    
    <!-- Additional Meta Tags -->
    <meta name="author" content="Cool Flow">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">
    <meta name="revisit-after" content="7 days">
    <link rel="canonical" href="https://coolflow.ng">
    <link rel="apple-touch-icon" href="logo.png">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
